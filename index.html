<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pulpo Alienígena Cooperativo</title>
<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

canvas { display: block; }

#ui {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    text-align: center;
    color: white;
    z-index: 10;
}

#healthBarContainer {
    width: 100%;
    height: 40px;
    background: #200;
    border: 3px solid white;
}

#healthBar {
    height: 100%;
    width: 100%;
    background: linear-gradient(to right, red, orange);
}

#phaseText {
    font-size: 24px;
}

#endScreen {
    position: absolute;
    top: 50%;
    width: 100%;
    text-align: center;
    font-size: 50px;
    color: yellow;
    text-shadow: 0 0 30px red;
    display: none;
}
</style>
</head>
<body>

<div id="ui">
    <div id="healthBarContainer"><div id="healthBar"></div></div>
    <div id="phaseText">FASE 1</div>
</div>

<div id="endScreen"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIG ---
let bossMaxHealth = 1200;
let bossHealth = bossMaxHealth;
let phase = 1;

let weakPoints = [];
let particles = [];

let gameOver = false;
let startTime = Date.now();

const boss = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 70,
    tentacles: 8,
    time: 0,
    shake: 0,
    exploding: false
};

// --- EXPLOSIÓN ---
let explosionParticles = [];

function explodeBoss() {
    boss.exploding = true;

    for (let i = 0; i < 200; i++) {
        explosionParticles.push({
            x: boss.x,
            y: boss.y,
            vx: (Math.random()-0.5)*12,
            vy: (Math.random()-0.5)*12,
            life: 1
        });
    }
}

// --- POSICIÓN TENTÁCULO ---
function getTentaclePoint(i, t) {

    const baseAngle = (Math.PI * 2 / boss.tentacles) * i;
    const angle = baseAngle + boss.time * 0.03;

    const baseOffset = boss.radius + 15;
    let maxLength = Math.min(canvas.width, canvas.height) * 0.35;

    let length = baseOffset + t * maxLength;

    let x = boss.x + Math.cos(angle) * length;
    let y = boss.y + Math.sin(angle) * length;

    x += Math.sin(t * 5 + boss.time + i) * 12;
    y += Math.cos(t * 5 + boss.time + i) * 12;

    return {x, y};
}

// --- PUNTOS DÉBILES ---
function spawnWeakPoint() {
    weakPoints.push({
        tentacle: Math.floor(Math.random() * boss.tentacles),
        t: 0.45 + Math.random() * 0.5,
        radius: 45,
        life: 3,
        timer: 0,
        maxTime: 400
    });
}

for (let i = 0; i < 6; i++) spawnWeakPoint();

// --- INPUT ---
canvas.addEventListener("pointerdown", e => {
    if (gameOver) return;

    const x = e.clientX;
    const y = e.clientY;

    weakPoints.forEach(wp => {
        const pos = getTentaclePoint(wp.tentacle, wp.t);

        const dx = x - pos.x;
        const dy = y - pos.y;

        if (Math.sqrt(dx*dx + dy*dy) < wp.radius) {
            damageBoss(10);
            wp.life--;

            for (let i = 0; i < 6; i++) {
                spawnParticles(pos.x, pos.y);
            }
        }
    });
});

// --- DAÑO ---
function damageBoss(amount) {
    if (gameOver) return;

    bossHealth -= amount;
    boss.shake = 15;

    if (bossHealth <= 0) {
        bossHealth = 0;
        triggerGameOver();
    }

    updateUI();
    checkPhase();
}

// --- GAME OVER ---
function triggerGameOver() {
    gameOver = true;
    explodeBoss();

    const time = ((Date.now() - startTime) / 1000).toFixed(2);

    document.getElementById("endScreen").style.display = "block";
    document.getElementById("endScreen").innerHTML =
        "💥 ¡JEFE DERROTADO! 💥<br><br>" +
        "⏱ Tiempo: " + time + " segundos<br><br>" +
        "¡Buen trabajo equipo!";
}

// --- FASES ---
function checkPhase() {
    let newPhase = 1;

    if (bossHealth < 900) newPhase = 2;
    if (bossHealth < 600) newPhase = 3;
    if (bossHealth < 250) newPhase = 4;

    if (newPhase !== phase) {
        phase = newPhase;
        boss.tentacles += 1;
        document.getElementById("phaseText").innerText = "FASE " + phase;
    }
}

// --- UI ---
function updateUI() {
    document.getElementById("healthBar").style.width =
        (bossHealth / bossMaxHealth * 100) + "%";
}

// --- PARTÍCULAS ---
function spawnParticles(x, y) {
    for (let i = 0; i < 15; i++) {
        particles.push({
            x, y,
            vx: (Math.random()-0.5)*5,
            vy: (Math.random()-0.5)*5,
            life: 1
        });
    }
}

function updateParticles() {
    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;

        ctx.fillStyle = `rgba(0,255,255,${p.life})`;
        ctx.fillRect(p.x, p.y, 3, 3);

        if (p.life <= 0) particles.splice(i,1);
    });
}

// --- EXPLOSIÓN ---
function updateExplosion() {
    explosionParticles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;

        ctx.fillStyle = `rgba(255,100,0,${p.life})`;
        ctx.fillRect(p.x, p.y, 6, 6);

        if (p.life <= 0) explosionParticles.splice(i,1);
    });
}

// --- DIBUJO PULPO ---
function drawBoss() {
    if (boss.exploding) return;

    const bx = boss.x + (Math.random()-0.5)*boss.shake;
    const by = boss.y + (Math.random()-0.5)*boss.shake;

    const bodyColor = "purple";

    for (let i = 0; i < boss.tentacles; i++) {

        const baseAngle = (Math.PI * 2 / boss.tentacles) * i;
        const angle = baseAngle + boss.time * 0.03;

        const startX = bx + Math.cos(angle) * (boss.radius - 5);
        const startY = by + Math.sin(angle) * (boss.radius - 5);

        ctx.beginPath();
        ctx.moveTo(startX, startY);

        for (let t = 0; t <= 1; t += 0.08) {
            const p = getTentaclePoint(i, t);
            const thickness = 22 * (1 - t);

            ctx.lineTo(p.x, p.y);
            ctx.lineWidth = thickness;
            ctx.strokeStyle = bodyColor;
            ctx.stroke();
        }
    }

    ctx.beginPath();
    ctx.ellipse(bx, by, boss.radius, boss.radius * 1.1, 0, 0, Math.PI*2);
    ctx.fillStyle = bodyColor;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(bx - 25, by - 10, 18, 0, Math.PI*2);
    ctx.arc(bx + 25, by - 10, 18, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();

    ctx.beginPath();
    ctx.arc(bx - 25, by - 10, 9, 0, Math.PI*2);
    ctx.arc(bx + 25, by - 10, 9, 0, Math.PI*2);
    ctx.fillStyle = "black";
    ctx.fill();

    boss.shake *= 0.9;
}

// --- PUNTOS DÉBILES ---
function updateWeakPoints() {
    if (gameOver) return;

    weakPoints.forEach((wp, i) => {

        wp.timer++;

        const pos = getTentaclePoint(wp.tentacle, wp.t);

        wp.radius *= 0.995;

        ctx.beginPath();
        ctx.arc(pos.x, pos.y, wp.radius, 0, Math.PI * 2);
        ctx.fillStyle = "red";
        ctx.fill();

        ctx.strokeStyle = "yellow";
        ctx.stroke();

        if (wp.timer > wp.maxTime || wp.life <= 0 || wp.radius < 12) {
            weakPoints.splice(i, 1);
            spawnWeakPoint();
        }
    });
}

// --- LOOP ---
function update() {
    boss.time += 0.02 * phase;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawBoss();
    updateWeakPoints();
    updateParticles();
    updateExplosion();

    requestAnimationFrame(update);
}

// --- RESIZE ---
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    boss.x = canvas.width / 2;
    boss.y = canvas.height / 2;
});

// --- START ---
updateUI();
update();
</script>

</body>
</html>
