<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Jefe Gigante Cooperativo</title>
<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at center, #111, #000);
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    #ui {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        text-align: center;
        color: white;
    }

    #healthBarContainer {
        width: 100%;
        height: 40px;
        background: #400;
        border: 3px solid white;
    }

    #healthBar {
        height: 100%;
        width: 100%;
        background: linear-gradient(to right, red, orange);
        transition: width 0.2s;
    }

    #phaseText {
        font-size: 24px;
        margin-top: 5px;
    }

    #message {
        position: absolute;
        top: 50%;
        width: 100%;
        text-align: center;
        font-size: 60px;
        color: yellow;
        text-shadow: 0 0 20px red;
        pointer-events: none;
    }
</style>
</head>
<body>

<div id="ui">
    <div id="healthBarContainer">
        <div id="healthBar"></div>
    </div>
    <div id="phaseText">FASE 1</div>
</div>

<div id="message"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIG ---
let bossMaxHealth = 1000;
let bossHealth = bossMaxHealth;

let phase = 1;

let weakPoints = [];
let particles = [];
let flashes = [];

const MAX_WEAKPOINTS = 5;

// --- BOSS ---
const boss = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 200,
    shake: 0
};

// --- CREAR PUNTOS DÉBILES ---
function spawnWeakPoint() {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * boss.radius * 0.8;

    weakPoints.push({
        x: boss.x + Math.cos(angle) * dist,
        y: boss.y + Math.sin(angle) * dist,
        radius: 50 + Math.random() * 30,
        life: 1,
        shrinking: true
    });
}

// Inicial
for (let i = 0; i < MAX_WEAKPOINTS; i++) spawnWeakPoint();

// --- INPUT (MULTI IMPACTOS) ---
canvas.addEventListener("pointerdown", (e) => {
    handleHit(e.clientX, e.clientY);
});

function handleHit(x, y) {
    weakPoints.forEach(wp => {
        const dx = x - wp.x;
        const dy = y - wp.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < wp.radius) {
            damageBoss(10);
            wp.life -= 0.5;
            spawnParticles(wp.x, wp.y);
            spawnFlash(wp.x, wp.y);
        }
    });
}

// --- DAÑO ---
function damageBoss(amount) {
    bossHealth -= amount;
    boss.shake = 20;

    if (bossHealth < 0) bossHealth = 0;

    updateUI();
    checkPhase();

    if (bossHealth === 0) {
        document.getElementById("message").innerText = "¡VICTORIA!";
    }
}

// --- FASES ---
function checkPhase() {
    let newPhase = 1;

    if (bossHealth < 700) newPhase = 2;
    if (bossHealth < 400) newPhase = 3;
    if (bossHealth < 150) newPhase = 4;

    if (newPhase !== phase) {
        phase = newPhase;
        document.getElementById("phaseText").innerText = "FASE " + phase;
        spawnExplosion();
    }
}

// --- EFECTOS ---
function spawnParticles(x, y) {
    for (let i = 0; i < 20; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            life: 1
        });
    }
}

function spawnFlash(x, y) {
    flashes.push({x, y, size: 100, life: 1});
}

function spawnExplosion() {
    for (let i = 0; i < 100; i++) {
        spawnParticles(boss.x, boss.y);
    }
}

// --- UI ---
function updateUI() {
    const percent = (bossHealth / bossMaxHealth) * 100;
    document.getElementById("healthBar").style.width = percent + "%";
}

// --- LOOP ---
function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBoss();
    updateWeakPoints();
    updateParticles();
    updateFlashes();

    requestAnimationFrame(update);
}

// --- DIBUJAR BOSS ---
function drawBoss() {
    const shakeX = (Math.random() - 0.5) * boss.shake;
    const shakeY = (Math.random() - 0.5) * boss.shake;

    ctx.beginPath();
    ctx.arc(boss.x + shakeX, boss.y + shakeY, boss.radius, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${Math.random()*10}, 80%, 40%)`;
    ctx.fill();

    boss.shake *= 0.9;
}

// --- PUNTOS DÉBILES ---
function updateWeakPoints() {
    weakPoints.forEach((wp, index) => {

        // Animación de latido
        wp.radius *= 0.995;

        ctx.beginPath();
        ctx.arc(wp.x, wp.y, wp.radius, 0, Math.PI * 2);
        ctx.fillStyle = "red";
        ctx.fill();

        if (wp.radius < 10 || wp.life <= 0) {
            weakPoints.splice(index, 1);
            spawnWeakPoint();
        }
    });
}

// --- PARTICULAS ---
function updateParticles() {
    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;

        ctx.fillStyle = `rgba(255,150,0,${p.life})`;
        ctx.fillRect(p.x, p.y, 5, 5);

        if (p.life <= 0) particles.splice(i, 1);
    });
}

// --- FLASHES ---
function updateFlashes() {
    flashes.forEach((f, i) => {
        f.size += 10;
        f.life -= 0.05;

        ctx.beginPath();
        ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,0,${f.life})`;
        ctx.lineWidth = 5;
        ctx.stroke();

        if (f.life <= 0) flashes.splice(i, 1);
    });
}

// --- RESIZE ---
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    boss.x = canvas.width / 2;
    boss.y = canvas.height / 2;
});

// --- START ---
updateUI();
update();
</script>

</body>
</html>
