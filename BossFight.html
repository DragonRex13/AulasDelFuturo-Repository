<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Boss Pulpo Alienígena</title>
<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at center, #050510, #000);
        font-family: Arial;
    }

    canvas { display: block; }

    #ui {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        text-align: center;
        color: white;
    }

    #healthBarContainer {
        width: 100%;
        height: 40px;
        background: #200;
        border: 3px solid white;
    }

    #healthBar {
        height: 100%;
        width: 100%;
        background: linear-gradient(to right, red, orange);
    }

    #phaseText {
        font-size: 24px;
    }

    #message {
        position: absolute;
        top: 50%;
        width: 100%;
        text-align: center;
        font-size: 60px;
        color: cyan;
        text-shadow: 0 0 30px purple;
    }
</style>
</head>
<body>

<div id="ui">
    <div id="healthBarContainer"><div id="healthBar"></div></div>
    <div id="phaseText">FASE 1</div>
</div>

<div id="message"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIG ---
let bossMaxHealth = 1000;
let bossHealth = bossMaxHealth;
let phase = 1;

let weakPoints = [];
let particles = [];

const boss = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 120,
    tentacles: 10,
    time: 0,
    shake: 0
};

// --- GENERAR TENTÁCULOS ---
function getTentaclePoint(i, t) {
    const angle = (Math.PI * 2 / boss.tentacles) * i;

    let length = 200 + Math.sin(boss.time + i) * 50;

    let x = boss.x + Math.cos(angle) * length;
    let y = boss.y + Math.sin(angle) * length;

    // ondulación
    x += Math.sin(t + i) * 30;
    y += Math.cos(t + i) * 30;

    return {x, y};
}

// --- PUNTOS DÉBILES ---
function spawnWeakPoint() {
    const tentacleIndex = Math.floor(Math.random() * boss.tentacles);
    const t = Math.random() * 2;

    const pos = getTentaclePoint(tentacleIndex, t);

    weakPoints.push({
        tentacle: tentacleIndex,
        t: t,
        radius: 40,
        life: 1
    });
}

for (let i = 0; i < 5; i++) spawnWeakPoint();

// --- INPUT ---
canvas.addEventListener("pointerdown", e => {
    const x = e.clientX;
    const y = e.clientY;

    weakPoints.forEach(wp => {
        const pos = getTentaclePoint(wp.tentacle, wp.t);

        const dx = x - pos.x;
        const dy = y - pos.y;

        if (Math.sqrt(dx*dx + dy*dy) < wp.radius) {
            damageBoss(10);
            wp.life -= 0.5;
            spawnParticles(pos.x, pos.y);
        }
    });
});

// --- DAÑO ---
function damageBoss(amount) {
    bossHealth -= amount;
    boss.shake = 20;

    if (bossHealth < 0) bossHealth = 0;

    updateUI();
    checkPhase();

    if (bossHealth === 0) {
        document.getElementById("message").innerText = "¡DERROTADO!";
    }
}

// --- FASES ---
function checkPhase() {
    let newPhase = 1;

    if (bossHealth < 700) newPhase = 2;
    if (bossHealth < 400) newPhase = 3;
    if (bossHealth < 150) newPhase = 4;

    if (newPhase !== phase) {
        phase = newPhase;
        boss.tentacles += 2; // más caos
        document.getElementById("phaseText").innerText = "FASE " + phase;
    }
}

// --- UI ---
function updateUI() {
    document.getElementById("healthBar").style.width =
        (bossHealth / bossMaxHealth * 100) + "%";
}

// --- PARTÍCULAS ---
function spawnParticles(x, y) {
    for (let i = 0; i < 15; i++) {
        particles.push({
            x, y,
            vx: (Math.random()-0.5)*8,
            vy: (Math.random()-0.5)*8,
            life: 1
        });
    }
}

function updateParticles() {
    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;

        ctx.fillStyle = `rgba(0,255,255,${p.life})`;
        ctx.fillRect(p.x, p.y, 4, 4);

        if (p.life <= 0) particles.splice(i,1);
    });
}

// --- DIBUJAR ---
function drawBoss() {
    const shakeX = (Math.random()-0.5)*boss.shake;
    const shakeY = (Math.random()-0.5)*boss.shake;

    // cuerpo
    ctx.beginPath();
    ctx.arc(boss.x + shakeX, boss.y + shakeY, boss.radius, 0, Math.PI*2);
    ctx.fillStyle = "purple";
    ctx.fill();

    // tentáculos
    for (let i = 0; i < boss.tentacles; i++) {
        ctx.beginPath();
        ctx.moveTo(boss.x, boss.y);

        for (let t = 0; t <= 1; t += 0.1) {
            const p = getTentaclePoint(i, t + boss.time);
            ctx.lineTo(p.x, p.y);
        }

        ctx.strokeStyle = "cyan";
        ctx.lineWidth = 8;
        ctx.stroke();
    }

    boss.shake *= 0.9;
}

// --- PUNTOS DÉBILES ---
function updateWeakPoints() {
    weakPoints.forEach((wp, i) => {

        const pos = getTentaclePoint(wp.tentacle, wp.t + boss.time);

        wp.radius *= 0.995;

        ctx.beginPath();
        ctx.arc(pos.x, pos.y, wp.radius, 0, Math.PI*2);
        ctx.fillStyle = "red";
        ctx.fill();

        if (wp.radius < 10 || wp.life <= 0) {
            weakPoints.splice(i,1);
            spawnWeakPoint();
        }
    });
}

// --- LOOP ---
function update() {
    boss.time += 0.02 * phase;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawBoss();
    updateWeakPoints();
    updateParticles();

    requestAnimationFrame(update);
}

// --- RESIZE ---
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    boss.x = canvas.width / 2;
    boss.y = canvas.height / 2;
});

// --- START ---
updateUI();
update();

</script>
</body>
</html>
